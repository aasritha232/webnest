<!DOCTYPE html>
<html>
<head>
    <title>WebNest AI Chatbot</title>
	<style>
	    body {
	        font-family: Arial;
	        background-color: #f4f6f8;
	        display: flex;
	        justify-content: center;
	        padding-top: 50px;
	    }
	    .chatbox {
	        background: white;
	        padding: 25px;
	        width: 400px;
	        border-radius: 15px;
	        box-shadow: 0 6px 12px rgba(0,0,0,0.1);
	    }
	    input, button {
	        width: 100%;
	        padding: 10px;
	        margin-top: 10px;
	    }
	    button {
	        background: #1e1e2f;
	        color: white;
	        border: none;
	        cursor: pointer;
	    }
	</style>

</head>
<body>

<div class="chatbox">
    <h2>🤖 WebNest AI Assistant</h2>

    <form action="/chatbot" method="post">
        <input type="text" name="message" placeholder="Ask me anything..." required>
        <button type="submit">Send</button>
    </form>

    <div class="reply">
        <p th:text="${reply}"></p>
    </div>
</div>

</body>
</html>
