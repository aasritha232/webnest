<!DOCTYPE html>
<html>
<head>
    <style>
        .navbar {
            background-color: #1e1e2f;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h2 {
            color: white;
            margin: 0;
        }
        .nav-links a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            font-size: 16px;
        }
        .nav-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="navbar">
    <h2>🌐 WebNest</h2>
    <div class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/chatbot">AI Chatbot</a>
        <a href="/login">Logout</a>
    </div>
</div>

</body>
</html>
